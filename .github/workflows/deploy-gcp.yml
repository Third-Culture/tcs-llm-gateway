name: deploy-gcp

# Builds per-service images from infra/split.dockerfile and deploys them to
# the four Cloud Run services that make up the live `third-culture` GCP
# deployment (see infra/gcp/README.md). Each service keeps its own
# lightweight image, matching what is actually running today — do NOT
# switch this to the unified all-in-one image (infra/unified.dockerfile):
# it boots a local Postgres/Redis and every app (including the worker) in
# a single container, which would run duplicate, uncoordinated worker
# processes inside api/gateway/ui and blow past their resource limits.
#
# `llmgateway-worker` (added after the api/gateway/ui-only migration left it
# undeployed for several days -- see infra/gcp/README.md's "Production
# deployment" section) has no HTTP traffic of its own; it's a background
# consumer of the Redis log/billing queue and the source of the
# project_hourly_stats rows that /internal/stats reads. It still deploys like
# the others because it exposes a minimal health endpoint (apps/worker/src/health-server.ts)
# to satisfy Cloud Run's container contract, with ingress restricted to
# internal traffic only.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gcp
  cancel-in-progress: false

env:
  GCP_PROJECT: third-culture
  GCP_REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/third-culture/tcs/llm-gateway
  DEPLOY_SERVICE_ACCOUNT: tcs-llm-deployer@third-culture.iam.gserviceaccount.com

jobs:
  test:
    uses: ./.github/workflows/run.yml
    secrets: inherit
    with:
      cmd: pnpm build && pnpm run setup && pnpm test:unit

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    strategy:
      matrix:
        include:
          - app: api
            service: llmgateway-api
          - app: gateway
            service: llmgateway-gateway
          - app: ui
            service: llmgateway-ui
          - app: worker
            service: llmgateway-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: echo "image_tag=gh-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Google Auth (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/split.dockerfile
          target: ${{ matrix.app }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }}-${{ matrix.app }}
          cache-from: type=gha,scope=split-${{ matrix.app }}-linux-amd64
          cache-to: type=gha,mode=max,scope=split-${{ matrix.app }}-linux-amd64
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.image_tag }}

      - name: Deploy ${{ matrix.service }}
        run: |
          gcloud run deploy ${{ matrix.service }} \
            --image="${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" \
            --project=${{ env.GCP_PROJECT }} \
            --region=${{ env.GCP_REGION }} \
            --quiet

  verify:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Google Auth (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Health check llmgateway-api
        run: |
          curl --fail --silent --show-error https://llmgateway-api-303980490211.us-central1.run.app/ \
            | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Health check llmgateway-gateway
        run: |
          curl --fail --silent --show-error https://llmgateway-gateway-303980490211.us-central1.run.app/ \
            | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Health check llmgateway-ui
        run: |
          curl --fail --silent --show-error https://llmgateway-ui-303980490211.us-central1.run.app/api/health \
            | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Health check llmgateway-worker
        # ingress: internal, so it isn't reachable from this runner over
        # plain HTTP -- confirm readiness the same way Cloud Run itself does,
        # by checking the deployed revision reports Ready=True.
        run: |
          ready=$(gcloud run services describe llmgateway-worker \
            --project="${{ env.GCP_PROJECT }}" --region="${{ env.GCP_REGION }}" \
            --format="value(status.conditions[0].status)")
          if [ "$ready" != "True" ]; then
            echo "llmgateway-worker is not Ready (status.conditions[0].status=$ready)" >&2
            exit 1
          fi

      - name: Completion smoke test
        env:
          GATEWAY_URL: https://llmgateway-gateway-303980490211.us-central1.run.app
          SMOKE_MODEL: tcs-reasoning
          SMOKE_TASK: company_refresh_json
        run: |
          GATEWAY_API_KEY=$(gcloud secrets versions access latest \
            --secret=llm-gateway-api-key \
            --project=$GCP_PROJECT)
          export GATEWAY_API_KEY
          ./infra/gcp/smoke-test.sh

      - name: Summary
        run: |
          echo "=================================================="
          echo "  tcs-llm-gateway deployed to third-culture"
          echo "=================================================="
          echo "    api:      https://llmgateway-api-303980490211.us-central1.run.app"
          echo "    gateway:  https://llmgateway-gateway-303980490211.us-central1.run.app"
          echo "    ui:       https://llmgateway-ui-303980490211.us-central1.run.app"
          echo "    worker:   (internal-only, no public URL)"
          echo "=================================================="
