# Production Cloud Run service for the LLM Gateway documentation site
# in williams-452112.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: docs
  labels:
    app: llmgateway
    component: docs
    managed-by: manual
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: REPLACE_SA@REPLACE_PROJECT.iam.gserviceaccount.com
      timeoutSeconds: 60
      containerConcurrency: 80
      containers:
        - name: docs
          image: REPLACE_REGISTRY/REPLACE_PROJECT/REPLACE_REPO/llmgateway-docs:REPLACE_TAG
          ports:
            - name: http1
              containerPort: 80
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: APP_VERSION
              value: REPLACE_TAG
          startupProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
  traffic:
    - latestRevision: true
      percent: 100
