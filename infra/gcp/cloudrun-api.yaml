# Reference Cloud Run service for the management API.
#
# Apply with:
#   gcloud run services replace infra/gcp/cloudrun-api.yaml \
#     --region=europe-west1 --project=tcs-llm-gateway-staging
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  labels:
    app: llmgateway
    component: api
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/cloudsql-instances: $REPLACE_PROJECT:$REPLACE_REGION:$REPLACE_SQL_INSTANCE
        run.googleapis.com/vpc-access-connector: projects/$REPLACE_PROJECT/locations/$REPLACE_REGION/connectors/$REPLACE_CONNECTOR
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      serviceAccountName: api-runtime@$REPLACE_PROJECT.iam.gserviceaccount.com
      timeoutSeconds: 60
      containerConcurrency: 80
      containers:
        - name: api
          image: $REPLACE_REGISTRY/$REPLACE_PROJECT/llmgateway/api@sha256:$REPLACE_DIGEST
          ports:
            - name: http1
              containerPort: 80
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "80"
            - name: RUN_MIGRATIONS
              value: "true"
            - name: TELEMETRY_ACTIVE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: api-$REPLACE_ENV
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: AUTH_SECRET
                  key: latest
            - name: GATEWAY_API_KEY_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: GATEWAY_API_KEY_HASH_SECRET
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: REDIS_URL
                  key: latest
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
  traffic:
    - latestRevision: true
      percent: 100
