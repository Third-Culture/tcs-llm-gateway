{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "llmgateway.fullname" . }}
  labels:
    {{- include "llmgateway.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if and .Values.ui.enabled .Values.ingress.hosts.ui }}
    - host: {{ .Values.ingress.hosts.ui | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmgateway.fullname" . }}-ui
                port:
                  name: http
    {{- end }}
    {{- if and .Values.api.enabled .Values.ingress.hosts.api }}
    - host: {{ .Values.ingress.hosts.api | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmgateway.fullname" . }}-api
                port:
                  name: http
    {{- end }}
    {{- if and .Values.gateway.enabled .Values.ingress.hosts.gateway }}
    - host: {{ .Values.ingress.hosts.gateway | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmgateway.fullname" . }}-gateway
                port:
                  name: http
    {{- end }}
    {{- if and .Values.playground.enabled .Values.ingress.hosts.playground }}
    - host: {{ .Values.ingress.hosts.playground | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmgateway.fullname" . }}-playground
                port:
                  name: http
    {{- end }}
    {{- if and .Values.code.enabled .Values.ingress.hosts.code }}
    - host: {{ .Values.ingress.hosts.code | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmgateway.fullname" . }}-code
                port:
                  name: http
    {{- end }}
    {{- if and .Values.docs.enabled .Values.ingress.hosts.docs }}
    - host: {{ .Values.ingress.hosts.docs | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmgateway.fullname" . }}-docs
                port:
                  name: http
    {{- end }}
    {{- if and .Values.admin.enabled .Values.ingress.hosts.admin }}
    - host: {{ .Values.ingress.hosts.admin | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "llmgateway.fullname" . }}-admin
                port:
                  name: http
    {{- end }}
{{- end }}
