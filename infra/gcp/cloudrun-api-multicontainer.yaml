# Production Cloud Run service for the LLM Gateway management API in
# williams-452112.
#
# Multi-container service (api + redis sidecar). Persistent storage is
# Cloud SQL Postgres (same instance the gateway uses, llmgateway-pg).
#
# Apply with:
#   gcloud run services replace infra/gcp/cloudrun-api.yaml \
#     --region=us-central1 --project=williams-452112
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api
  labels:
    app: llmgateway
    component: api
    managed-by: manual
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/cloudsql-instances: REPLACE_PROJECT:REPLACE_REGION:REPLACE_SQL_INSTANCE
        run.googleapis.com/container-dependencies: '{"api":["redis"]}'
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: REPLACE_SA@REPLACE_PROJECT.iam.gserviceaccount.com
      timeoutSeconds: 600
      containerConcurrency: 80
      containers:
        - name: api
          image: REPLACE_REGISTRY/REPLACE_PROJECT/REPLACE_REPO/llmgateway-api:REPLACE_TAG
          ports:
            - name: http1
              containerPort: 80
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          env:
            - name: NODE_ENV
              value: production
            - name: TELEMETRY_ACTIVE
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: api-prod
            - name: HOSTED
              value: "false"
            - name: RUN_MIGRATIONS
              value: "true"
            - name: REDIS_HOST
              value: "127.0.0.1"
            - name: REDIS_PORT
              value: "6379"
            - name: API_URL
              value: REPLACE_API_URL
            - name: UI_URL
              value: REPLACE_UI_URL
            - name: PLAYGROUND_URL
              value: REPLACE_PLAYGROUND_URL
            - name: DOCS_URL
              value: REPLACE_DOCS_URL
            - name: ORIGIN_URLS
              value: REPLACE_ORIGIN_URLS
            - name: COOKIE_DOMAIN
              value: ""
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: llmgateway-auth-secret
                  key: latest
            - name: GATEWAY_API_KEY_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: llmgateway-api-key-hash-secret
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: llmgateway-database-url
                  key: latest
          startupProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
        - name: redis
          image: redis:7-alpine
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 1
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
  traffic:
    - latestRevision: true
      percent: 100
