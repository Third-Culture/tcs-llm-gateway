# Production Cloud Run service for the LLM Gateway dashboard UI in
# williams-452112.
#
# Stateless Next.js standalone server. All data is fetched from the
# api Cloud Run service via process.env.API_URL.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ui
  labels:
    app: llmgateway
    component: ui
    managed-by: manual
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: REPLACE_SA@REPLACE_PROJECT.iam.gserviceaccount.com
      timeoutSeconds: 60
      containerConcurrency: 80
      containers:
        - name: ui
          image: REPLACE_REGISTRY/REPLACE_PROJECT/REPLACE_REPO/llmgateway-ui:REPLACE_TAG
          ports:
            - name: http1
              containerPort: 80
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTED
              value: "false"
            - name: APP_URL
              value: REPLACE_UI_URL
            - name: API_URL
              value: REPLACE_API_URL
            - name: API_BACKEND_URL
              value: REPLACE_API_URL
            - name: GATEWAY_URL
              value: REPLACE_GATEWAY_URL
            - name: PLAYGROUND_URL
              value: REPLACE_PLAYGROUND_URL
            - name: DOCS_URL
              value: REPLACE_DOCS_URL
            - name: APP_VERSION
              value: REPLACE_TAG
          startupProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: 80
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
  traffic:
    - latestRevision: true
      percent: 100
