name: tcs-deploy

# Builds per-service images from infra/split.dockerfile and deploys them to
# the llmgateway-gateway/-api/-ui Cloud Run services in the third-culture
# GCP project.
#
# Triggered on push to `tcs/main` (our customization branch) or manually.
# Uses Workload Identity Federation — no JSON service account keys.
#
# IMPORTANT: `main`'s deploy-gcp.yml deploys these exact same Cloud Run
# services (plus llmgateway-worker) from infra/split.dockerfile too. Both
# pipelines target the same live services, so whichever branch merges and
# deploys last wins — this file MUST keep building split, per-service images
# to stay compatible with that. Do NOT switch this back to building
# infra/unified.dockerfile and deploying it here: the unified image boots
# every app (including the worker's batch credit-deduction loop) inside one
# container, so llmgateway-ui/-gateway/-api would each run duplicate,
# uncoordinated worker logic and crash (this happened in production on
# 2026-07-21/22 — TCS-1195, TCS-1196 — after this workflow deployed the
# unified image and overwrote a split-image deploy from `main`).

on:
  push:
    branches:
      - tcs/main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional override for the image tag prefix (defaults to tcs-<short SHA>)"
        required: false
        type: string

concurrency:
  group: tcs-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT: third-culture
  GCP_REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/third-culture/tcs/llm-gateway
  # Pre-created via infra/gcp/bootstrap.sh:
  #   - WIF pool:        tcs-github-pool
  #   - WIF provider:    tcs-github-provider
  #   - Deploy SA:       tcs-llm-deployer@third-culture.iam.gserviceaccount.com
  # WIF provider audience requires the GCP project NUMBER (not the project ID).
  WIF_PROVIDER: projects/303980490211/locations/global/workloadIdentityPools/tcs-github-pool/providers/tcs-github-provider
  DEPLOY_SA: tcs-llm-deployer@third-culture.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - app: api
            service: llmgateway-api
          - app: gateway
            service: llmgateway-gateway
          - app: ui
            service: llmgateway-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve image tag
        id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "value=${{ inputs.image_tag }}-${{ matrix.app }}" >> "$GITHUB_OUTPUT"
          else
            short_sha=$(git rev-parse --short HEAD)
            echo "value=tcs-${short_sha}-${{ matrix.app }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/split.dockerfile
          target: ${{ matrix.app }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=tcs-split-${{ matrix.app }}-linux-amd64
          cache-to: type=gha,mode=max,scope=tcs-split-${{ matrix.app }}-linux-amd64

      - name: Deploy ${{ matrix.service }}
        run: |
          gcloud run deploy ${{ matrix.service }} \
            --image="${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" \
            --project=${{ env.GCP_PROJECT }} \
            --region=${{ env.GCP_REGION }} \
            --quiet

      - name: Summary
        run: |
          echo "### ${{ matrix.service }} rollout" >> "$GITHUB_STEP_SUMMARY"
          echo "- image: \`${{ env.IMAGE }}@${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- tag: \`${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"

  worker-tier-check-env:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      # Worker keeps its own revision/image wiring (health probe on :8080). Only
      # refresh the tier-check env so hourly routing probes stay enabled.
      - name: Ensure worker tier-check env
        run: ./infra/gcp/ensure-tier-check-env.sh
