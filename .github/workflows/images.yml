name: images

# Validates that the split and unified Dockerfiles still build (and, for the
# unified image, actually boot and pass health checks) on every push/PR.
# These builds are local-only (never pushed to a registry) — the image that
# actually ships to production is built and pushed by deploy-gcp.yml.

on:
  release:
    types: [published]
  push:
    branches:
      - main
      - hotfix
  pull_request:
    paths:
      - "**/package.json"
      - "**/tsconfig.json"
      - "pnpm-lock.yaml"
      - "infra/**"
      - ".github/workflows/images.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.IMAGE_TAG }}
      short_sha: ${{ steps.set-tag.outputs.SHORT_SHA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag
        id: set-tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "IMAGE_TAG=pr-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=ci-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

  build-split:
    needs: setup
    if: needs.setup.result == 'success'
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        app: [api, gateway, playground, ui, docs, worker, admin, code]
        platform: ${{ github.event_name == 'pull_request' && fromJSON('["linux/amd64"]') || fromJSON('["linux/amd64", "linux/arm64"]') }}
    permissions:
      contents: read
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (validation only, not published)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/split.dockerfile
          platforms: ${{ matrix.platform }}
          tags: tcs-llm-gateway-${{ matrix.app }}:${{ needs.setup.outputs.image_tag }}
          target: ${{ matrix.app }}
          outputs: type=image,push=false,load=true
          cache-from: type=gha,scope=${{ matrix.app }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ env.PLATFORM_PAIR }}
          build-args: |
            APP_VERSION=${{ needs.setup.outputs.image_tag }}

  test-split:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build-split
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.build-split.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h

          # Remove unnecessary tools and files
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          # Clean up docker
          docker system prune -af --volumes

          echo "Disk space after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build all split Docker images for testing
        run: |
          # Build all split images sequentially (local tags only, never pushed)
          for app in api gateway playground ui docs worker admin code; do
            echo "Building $app image..."
            docker build \
              -f infra/split.dockerfile \
              --target $app \
              --build-arg APP_VERSION=${{ needs.setup.outputs.image_tag }} \
              -t localtest/tcs-llm-gateway-$app:${{ needs.setup.outputs.image_tag }} \
              .

            # Clean up intermediate build layers to free space
            docker image prune -f

            echo "Disk space after building $app:"
            df -h / | tail -1
          done

      - name: Test split Docker images
        run: |
          chmod +x .github/test-split-docker.sh
          .github/test-split-docker.sh localtest/tcs-llm-gateway ${{ needs.setup.outputs.image_tag }}

  build-unified:
    needs: setup
    if: needs.setup.result == 'success'
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event_name == 'pull_request' && fromJSON('["linux/amd64"]') || fromJSON('["linux/amd64", "linux/arm64"]') }}
    permissions:
      contents: read
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (validation only, not published)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/unified.dockerfile
          platforms: ${{ matrix.platform }}
          tags: tcs-llm-gateway-unified:${{ needs.setup.outputs.image_tag }}
          outputs: type=image,push=false,load=true
          cache-from: type=gha,scope=unified-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=unified-${{ env.PLATFORM_PAIR }}
          build-args: |
            APP_VERSION=${{ needs.setup.outputs.image_tag }}

  test-unified:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build-unified
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.build-unified.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build unified Docker image for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/unified.dockerfile
          platforms: linux/amd64
          tags: test-unified-image:latest
          push: false
          load: true
          cache-from: type=gha,scope=unified-linux-amd64
          build-args: |
            APP_VERSION=${{ needs.setup.outputs.image_tag }}

      - name: Test unified Docker image
        run: |
          chmod +x .github/test-unified-docker.sh
          .github/test-unified-docker.sh test-unified-image:latest
