name: deploy-gcp

# Builds the unified image and deploys it to the three Cloud Run services
# that make up the live `third-culture` GCP deployment (see
# infra/gcp/README.md). This is the only supported way to ship a change to
# that environment — do not `docker push` / `gcloud run deploy` by hand.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gcp
  cancel-in-progress: false

env:
  GCP_PROJECT: third-culture
  GCP_REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/third-culture/tcs/llm-gateway
  DEPLOY_SERVICE_ACCOUNT: tcs-llm-deployer@third-culture.iam.gserviceaccount.com

jobs:
  test:
    uses: ./.github/workflows/run.yml
    secrets: inherit
    with:
      cmd: pnpm build && pnpm run setup && pnpm test:unit

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: echo "image_tag=gh-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Google Auth (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/unified.dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha,scope=unified-linux-amd64
          cache-to: type=gha,mode=max,scope=unified-linux-amd64
          build-args: |
            APP_VERSION=${{ steps.tag.outputs.image_tag }}

      - name: Summary
        run: |
          echo "Pushed ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }} (${{ steps.build.outputs.digest }})"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        service: [llmgateway-api, llmgateway-gateway, llmgateway-ui]
    steps:
      - name: Google Auth (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Deploy ${{ matrix.service }}
        run: |
          gcloud run deploy ${{ matrix.service }} \
            --image="${{ env.IMAGE }}@${{ needs.build-and-push.outputs.image_digest }}" \
            --project=${{ env.GCP_PROJECT }} \
            --region=${{ env.GCP_REGION }} \
            --quiet

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Health check llmgateway-api
        run: |
          curl --fail --silent --show-error https://llmgateway-api-303980490211.us-central1.run.app/ \
            | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Health check llmgateway-gateway
        run: |
          curl --fail --silent --show-error https://llmgateway-gateway-303980490211.us-central1.run.app/ \
            | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Health check llmgateway-ui
        run: |
          curl --fail --silent --show-error https://llmgateway-ui-303980490211.us-central1.run.app/api/health \
            | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Summary
        run: |
          echo "=================================================="
          echo "  tcs-llm-gateway deployed to third-culture"
          echo "=================================================="
          echo "    api:      https://llmgateway-api-303980490211.us-central1.run.app"
          echo "    gateway:  https://llmgateway-gateway-303980490211.us-central1.run.app"
          echo "    ui:       https://llmgateway-ui-303980490211.us-central1.run.app"
          echo "=================================================="
