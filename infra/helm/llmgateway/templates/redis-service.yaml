{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llmgateway.fullname" . }}-redis
  labels:
    {{- include "llmgateway.componentLabels" (dict "context" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "redis") | nindent 4 }}
{{- end }}
